<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>CV - Portfolio</title>
		<link rel="stylesheet" href="CSS/header.css">
		<link rel="stylesheet" href="CSS/main.css">
		<link rel="stylesheet" href="CSS/cv.css">
		<link rel="stylesheet" href="CSS/footer.css">
		<script src="JS/header.js"></script>
		<script src="JS/footer.js"></script>
	</head>
	<body>
		<main>
			<section class="cv-shell">
				<div class="cv-hero">
					<h1>Mon CV</h1>
					<p>
						Consultez mon CV au format PDF ou ouvrez-le dans un nouvel onglet pour le télécharger.
					</p>
				</div>

				<div class="cv-actions">
					<a
						class="btn btn-primary cv-button"
						href="IMG/CV_Lemaire_Nathan.pdf"
						target="_blank"
						rel="noopener noreferrer"
						>Ouvrir le PDF</a
					>
					<a class="btn btn-secondary cv-button" href="IMG/CV_Lemaire_Nathan.pdf" download
						>Télécharger le CV</a
					>
				</div>

				<div class="cv-frame-card">
					<iframe
						class="cv-frame"
						src="IMG/CV_Lemaire_Nathan.pdf"
						title="CV de Nathan Lemaire"
					></iframe>
				</div>
			</section>
		</main>
	</body>
</html>
