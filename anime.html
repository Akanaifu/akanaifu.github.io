<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Animés (JSON local)</title>
		<link rel="stylesheet" href="../CSS/anime.css">
		<link rel="stylesheet" href="../CSS/header.css">
		<link rel="stylesheet" href="../CSS/footer.css">
		<script src="../JS/header.js"></script>
		<script src="../JS/footer.js"></script>
		<script src="../JS/anime.js"></script>
	</head>
	<body>
		<main>
			<div class="topbar">
				<div class="topbar-filters">
					<div class="filter-group search-group">
						<label for="search-input">Recherche</label>
						<input type="text" id="search-input" placeholder="Nom de l'animé...">
					</div>
					<span id="anime-count" class="count-badge"></span>
					<span id="data-source-badge" class="source-badge offline">⏳ Chargement...</span>
				</div>
			</div>
			<section id="table-view">
				<table id="anime-table">
					<thead>
						<tr>
							<th id="th-alpha" class="sortable">
								Nom <span class="sort-arrow"></span>
							</th>
							<th id="th-fav" class="sortable">
								Favoris <span class="sort-arrow"></span>
							</th>
							<th id="th-type" class="sortable">
								Catégorie <span class="sort-arrow"></span>
							</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</section>
		</main>
	</body>
</html>
